    />

    <style>

        html {

            margin: 0;
            padding: 0;

            background: #050505;

            scroll-behavior: smooth;
        }

        body {

            margin: 0;
            padding: 0;

            background: #050505;

            overflow-x: hidden;

            font-family: "Inter", sans-serif;

            position: static;

            min-height: 100vh;

            color: #ffffff;

            text-rendering: optimizeLegibility;

            -webkit-font-smoothing: antialiased;

            -moz-osx-font-smoothing: grayscale;
        }

        #root {

            min-height: 100vh;
        }

        /* GLOBAL NAVBAR PORTAL */

        #navbar-root {

            position: fixed;

            top: 0;

            left: 0;

            right: 0;

            width: 100%;

            z-index: 2147483647;

            pointer-events: none;

            margin: 0;

            padding: 0;
        }

        /* FIX FAVICON ROUND DISPLAY */

        link[rel="icon"] {

            border-radius: 9999px;
        }

        /* SCROLLBAR */

        ::-webkit-scrollbar {

            width: 10px;
        }

        ::-webkit-scrollbar-track {

            background: #050505;
        }

        ::-webkit-scrollbar-thumb {

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,170,70,0.65),
                    rgba(255,120,20,0.55)
                );

            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,190,90,0.85),
                    rgba(255,140,40,0.75)
                );
        }

        /* SELECTION */

        ::selection {

            background:
                rgba(255,160,60,0.25);

            color: #ffffff;
        }

    </style>

</head>

    <!-- GLOBAL NAVBAR PORTAL -->

    <div id="navbar-root"></div>

    <div id="root"></div>

        src="/src/main.jsx"
    ></script>

</body>

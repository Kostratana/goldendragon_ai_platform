<!doctype html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <!-- PRIMARY SEO -->

    <title>
        Golden Dragon AI • Murzik AI Systems • Multimodal Intelligence Platform
    </title>

    <meta
        name="description"
        content="Advanced AI systems, multimodal intelligence, AI orchestration, neural architectures, investor AI platforms, voice AI and intelligent automation systems created by Svetlana Rumyantseva."
    />

    <meta
        name="keywords"
        content="AI systems, multimodal AI, AI developer, AI orchestration, AI agents, neural systems, LLM platform, AI Panama, intelligent automation, Murzik AI, AI architecture, voice AI, AI investor platform"
    />

    <meta
        name="author"
        content="Svetlana Rumyantseva"
    />

    <meta
        name="robots"
        content="index, follow"
    />

    <meta
        name="theme-color"
        content="#050505"
    />

    <!-- OPEN GRAPH -->

    <meta
        property="og:title"
        content="Golden Dragon AI • Murzik AI Systems"
    />

    <meta
        property="og:description"
        content="Advanced multimodal AI systems, intelligent orchestration, voice AI and investor-ready AI architectures."
    />

    <meta
        property="og:type"
        content="website"
    />

    <meta
        property="og:url"
        content="https://www.goldendragonai.com"
    />

    <meta
        property="og:image"
        content="https://www.goldendragonai.com/favicon.png"
    />

    <!-- TWITTER -->

    <meta
        name="twitter:card"
        content="summary_large_image"
    />

    <meta
        name="twitter:title"
        content="Golden Dragon AI • Murzik AI Systems"
    />

    <meta
        name="twitter:description"
        content="Advanced multimodal AI systems and intelligent AI orchestration platform."
    />

    <meta
        name="twitter:image"
        content="https://www.goldendragonai.com/favicon.png"
    />

    <!-- CANONICAL -->

    <link
        rel="canonical"
        href="https://www.goldendragonai.com"
    />

    <!-- ROUND FAVICON -->

    <link
        rel="icon"
        type="image/png"
        href="/favicon.png"
    />

    <!-- FONTS -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    />

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    />

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap"
        rel="stylesheet"
    />

    <!-- GOOGLE TRANSLATE -->

    <script type="text/javascript">

        function googleTranslateElementInit() {

            new google.translate.TranslateElement(
                {
                    pageLanguage: "en",

                    includedLanguages:
                        "en,ru,es,fr,de",

                    autoDisplay: false
                },

                "google_translate_element"
            );
        }

    </script>

    <script
        type="text/javascript"
        src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"
    ></script>

    <style>

        html {

            margin: 0;
            padding: 0;

            background: #050505;

            scroll-behavior: smooth;
        }

        body {

            margin: 0;
            padding: 0;

            background: #050505;

            overflow-x: hidden;

            font-family: "Inter", sans-serif;

            position: relative;

            min-height: 100vh;

            color: #ffffff;

            text-rendering: optimizeLegibility;

            -webkit-font-smoothing: antialiased;

            -moz-osx-font-smoothing: grayscale;
        }

        #root {

            min-height: 100vh;
        }

        /* GLOBAL NAVBAR PORTAL */

        #navbar-root {

            position: fixed;

            top: 0;

            left: 0;

            right: 0;

            width: 100%;

            z-index: 999999;

            pointer-events: none;
        }

        /* REMOVE GOOGLE TOP BAR */

        iframe.skiptranslate {

            display: none !important;
        }

        .goog-te-banner-frame {

            display: none !important;
        }

        body {

            top: 0 !important;
        }

        /* HIDE GOOGLE LOGO */

        .goog-logo-link,
        .goog-te-gadget span {

            display: none !important;
        }

        .goog-te-gadget {

            color: transparent !important;

            font-size: 0px !important;
        }

        /* HIDE DEFAULT DROPDOWN */

        .goog-te-combo {

            display: none !important;
        }

        /* TRANSLATE WRAPPER */

        #google_translate_element {

            position: fixed;

            opacity: 0;

            pointer-events: none;

            z-index: -9999;
        }

        /* FIX FAVICON ROUND DISPLAY */

        link[rel="icon"] {

            border-radius: 9999px;
        }

        /* SCROLLBAR */

        ::-webkit-scrollbar {

            width: 10px;
        }

        ::-webkit-scrollbar-track {

            background: #050505;
        }

        ::-webkit-scrollbar-thumb {

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,170,70,0.65),
                    rgba(255,120,20,0.55)
                );

            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {

            background:
                linear-gradient(
                    to bottom,
                    rgba(255,190,90,0.85),
                    rgba(255,140,40,0.75)
                );
        }

        /* SELECTION */

        ::selection {

            background:
                rgba(255,160,60,0.25);

            color: #ffffff;
        }

    </style>

</head>

<body>

    <!-- GOOGLE TRANSLATE -->

    <div id="google_translate_element"></div>

    <!-- GLOBAL NAVBAR PORTAL -->

    <div id="navbar-root"></div>

    <!-- APP -->

    <div id="root"></div>

    <script
        type="module"
        src="/src/main.jsx"
    ></script>

</body>

</html>
